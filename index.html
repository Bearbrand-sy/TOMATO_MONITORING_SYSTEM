<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenGrow · Login</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/login.css">
</head>
<body>

<div class="card">
    <div class="brand">
        <span class="brand-logo">🌿 GreenGrow</span>
        <span class="brand-sub">Farm Management</span>
        <div class="brand-divider"></div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account</p>

    <div class="error-msg" id="errorMsg">⚠ Invalid username or password</div>

    <div class="field">
        <label>Username</label>
        <div class="input-wrap">
            <span class="icon">👤</span>
            <input type="text" id="Email" placeholder="Enter your username" autocomplete="username">
        </div>
    </div>

    <div class="field">
        <label>Password</label>
        <div class="input-wrap">
            <span class="icon">🔒</span>
            <input type="password" id="Password" placeholder="Enter your password" autocomplete="current-password"
                   onkeydown="if(event.key==='Enter') login()">
        </div>
    </div>

    <button class="btn-login" onclick="login()">Sign In</button>

    <div class="card-footer">GreenGrow © 2026 · All rights reserved</div>
</div>

<!-- ✅ Helper defined FIRST so script.js can call showLoginError() -->
<script>
function showLoginError() {
    const el = document.getElementById("errorMsg");
    el.classList.remove("show");
    void el.offsetWidth; // reflow to re-trigger shake animation
    el.classList.add("show");
}
</script>

<!-- ✅ script.js loaded AFTER helper is defined -->
<script src="script.js"></script>

</body>
</html>
