<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenGrow · Users</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../manager_assets/account_manager.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">
        🌿 GreenGrow
        <span>Farm Management</span>
    </div>
    <a href="manager.html" class="nav-btn">Monitoring</a>
    <a href="datalogsmanager.html" class="nav-btn">Data Logs</a>
    <a href="transportmanager.html" class="nav-btn">Transport Logs</a>
    <a href="create_delivery.html" class="nav-btn">Create Delivery</a>
    <a href="accounts_manager.html" class="nav-btn active">Users</a>
    <div class="sidebar-foot">
               <!-- Logged-in user card -->
        <div class="user-card" id="userCard">
            <div class="user-avatar" id="userAvatar">?</div>
            <div class="user-meta">
                <div class="user-name" id="userName">—</div>
                <div class="user-role" id="userRole"></div>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()">↩ Logout</button>
    </div>
</div>

<div class="main">
    <div class="page-header">
        <h1>User Management</h1>
        <p>Manage accounts and roles</p>
    </div>

    <!-- Add User -->
    <div class="panel">
        <div class="panel-title">Add User</div>
        <div class="form-grid">
            <div class="form-field">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Name Surname">
            </div>
            <div class="form-field">
                <label>Email</label>
                <input type="text" id="email" placeholder="name@email.com">
            </div>
            <div class="form-field">
                <label>Contact Number</label>
                <input type="text" id="contact" placeholder="09xxxxxxxxx">
            </div>
            <div class="form-field">
                <label>Role</label>
                <select id="role">
                    <option value="User">User</option>
                    <option value="Manager">Manager</option>
                </select>
            </div>
        </div>
        <button class="btn-primary" onclick="addUser()">+ Add User</button>
    </div>

    <!-- User Table -->
    <div class="panel">
        <div class="panel-title">Accounts</div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Contact</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="account_manager.js"></script>
<script src="manager.js"></script>
<script>
function logout() {
    if (confirm("Are you sure you want to logout?")) {
        localStorage.removeItem("loggedUser");
        window.location.href = "../index.html";
    }
}
if (typeof renderUsers === 'function') renderUsers();

// ============================
// LOAD LOGGED-IN USER
// ============================
(function loadUser() {
    try {
        const raw = localStorage.getItem("loggedUser");
        if (!raw) return;
        const user = JSON.parse(raw);

        // Avatar: first letter of name
        document.getElementById("userAvatar").textContent =
            (user.name || "?").charAt(0).toUpperCase();

        // Name
        document.getElementById("userName").textContent = user.name || "Unknown";

        // Role with colour
        const roleEl = document.getElementById("userRole");
        const role   = (user.role || "").toLowerCase();
        roleEl.textContent  = user.role || "";
        roleEl.className    = "user-role role-" + role;

    } catch (e) { /* silently ignore parse errors */ }
})();
</script>
</body>
</html>
